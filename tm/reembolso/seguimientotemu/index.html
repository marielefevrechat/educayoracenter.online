<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seguimiento - Entregas TEMU</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      color: #333;
    }

    header {
      background: #ff6d0d;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
      border-radius: 8px;
    }

    h2 {
      margin-bottom: 20px;
      color: #ff6d0d;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      margin-bottom: 15px;
    }

    button {
      padding: 12px 20px;
      background: #ff6d0d;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #c31f67;
    }

    .timeline {
      margin-top: 30px;
      border-left: 3px solid #dd2a7b;
      padding-left: 20px;
    }

    .event {
      margin-bottom: 20px;
    }

    .event strong {
      display: block;
      margin-bottom: 5px;
    }

    .user-location {
      margin-top: 10px;
      font-size: 0.9em;
      color: #555;
    }

    .success {
      background: #e8f9f1;
      padding: 15px;
      border-left: 4px solid #1bbf72;
      border-radius: 4px;
      margin-top: 20px;
    }

    .produto-img-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 15px;
    }

    .produto-img-grid img {
      width: 100px;
      height: auto;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .mapa {
      display: none;
      margin-top: 20px;
    }

    .progress-bar {
      background: #eee;
      border-radius: 20px;
      overflow: hidden;
      height: 20px;
    }

    .progress-fill {
      background: #ff6d0d;
      height: 100%;
      width: 0%;
      transition: width 1s ease-in-out;
    }
  </style>
</head>
<body>

  <header>
    <h1>TEMU • Seguimiento de pedido</h1>
  </header>

  <div class="container">
    <h2>Ingresa tu número de seguimiento:</h2>
    <input type="text" id="codigo" placeholder="Ej: SHN458239817BR" />
    <button onclick="rastrear()">Rastrear pedido</button>

    <div id="resultado"></div>

    <div class="mapa" id="mapa">
      <iframe id="mapFrame" src="" width="100%" height="250" frameborder="0" style="border:0" allowfullscreen></iframe>
    </div>
  </div>

  <script>
  let ciudad = '', estado = '';
  fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
      ciudad = data.city;
      estado = data.region;
      document.getElementById("userLocation").innerText = "Ubicación detectada.";
      document.getElementById("mapFrame").src = `https://maps.google.com/maps?q=${ciudad}%20${estado}&t=&z=13&ie=UTF8&iwloc=&output=embed`;
    })
    .catch(() => {
      document.getElementById("userLocation").innerText = "Ubicación no identificada.";
    });

  function solicitarPermissaoNotificacao() {
    if ("Notification" in window && Notification.permission !== "granted") {
      Notification.requestPermission();
    }
  }
  solicitarPermissaoNotificacao();

  function enviarNotificacao(titulo, mensagem) {
    if ("Notification" in window && Notification.permission === "granted") {
      new Notification(titulo, { body: mensagem });
    }
  }

  function rastrear() {
    const codigo = document.getElementById("codigo").value.trim();
    const resultado = document.getElementById("resultado");
    const mapa = document.getElementById("mapa");
    if (!codigo) {
      resultado.innerHTML = "<p style='color:red;'>Por favor, ingresa un número de seguimiento válido.</p>";
      return;
    }
    mapa.style.display = 'block';

    const hoy = new Date();
    const op = { day: '2-digit', month: '2-digit', year: 'numeric' };

    const fechaCompra = new Date();
    const diasDesdeCompra = Math.floor((hoy - fechaCompra) / (1000 * 60 * 60 * 24));
    const porcentajeEntrega = Math.min(100, Math.floor((diasDesdeCompra / 30) * 100));

    const etapas = [
      { dias: 0,  local: 'China',                  texto: 'Pedido confirmado por TEMU.' },
      { dias: 6,  local: 'En tránsito',             texto: 'Paquete enviado al centro de distribución.' },
      { dias: 12, local: 'Aduana',                  texto: 'Inspección y despacho aduanero internacional.' },
      { dias: 18, local: 'Distribución regional',   texto: 'Enviado al centro de distribución local.' },
      { dias: 24, local: 'Último kilómetro',        texto: 'En camino hacia el destino final.' },
      { dias: 30, local: 'Entregado',               texto: `El pedido fue entregado exitosamente en ${ciudad}, ${estado}.` }
    ];

    const timeline = [];

    etapas.forEach(etapa => {
      const fechaEtapa = new Date(fechaCompra);
      fechaEtapa.setDate(fechaCompra.getDate() + etapa.dias);

      if (hoy >= fechaEtapa) {
        timeline.push(
          `<div class="event">
            <strong>${fechaEtapa.toLocaleDateString('es-ES', op)} - ${etapa.local}</strong>
            <span style="color: green; font-weight: bold;">✔</span> ${etapa.texto}
          </div>`
        );
      } else {
        timeline.push(
          `<div class="event" style="opacity: 0.4;">
            <strong>${fechaEtapa.toLocaleDateString('es-ES', op)} - ${etapa.local}</strong>
            <span style="color: gray;">⏳</span> ${etapa.texto}
          </div>`
        );
      }
    });

    resultado.innerHTML = `
      <div class="success">
        Código <strong>${codigo}</strong> localizado con éxito. Tu pedido está en camino hacia <strong>${ciudad}, ${estado}</strong>.
      </div>
      <div class="pedido-info">
        <strong>📦 Detalles del pedido</strong><br>
        Número de pedido: #1248819<br>
        Producto: Ropa + Accesorios + Calzado + Bolsos + Electrónica<br>
        Total: $0,00 Productos gratuitos<br>
        Fecha de compra: ${fechaCompra.toLocaleDateString('es-ES', op)}<br>
        Método de envío: Entrega estándar (hasta 30 días)
      </div>
      <div style="margin: 20px 0;">
        <label><strong>📊 Progreso de la entrega:</strong></label>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${porcentajeEntrega}%"></div>
        </div>
        <small>${porcentajeEntrega}% del recorrido completado</small>
      </div>
      <div class="timeline">
        ${timeline.join('')}
      </div>
      <div class="produto-img">
        <strong>🎁 Ver los productos enviados a tu domicilio 🎁 - Tus recompensas:</strong>
        <div class="produto-img-grid">
          <img src="https://i.pinimg.com/736x/31/45/3d/31453dc3c8999067684833a20e9ff6b3.jpg">
          <img src="https://i.pinimg.com/736x/24/57/99/2457991b02ad3bd42f3debaa46d8f82f.jpg">
          <img src="https://i.pinimg.com/474x/7f/df/e6/7fdfe6f9bcbfdee5b841d16ecc552b69.jpg">
          <img src="https://i.pinimg.com/474x/1c/21/ed/1c21ed623878a7604d2838c690b33628.jpg">
          <img src="https://i.pinimg.com/736x/b0/40/0d/b0400d5c5ce778c184e3299e788e573b.jpg">
          <img src="https://i.pinimg.com/1200x/eb/30/f2/eb30f264a3de13be86aa449aa3fcdb88.jpg">
        </div>
      </div>
    `;

    enviarNotificacao("📦 Pedido rastreado", `Tu pedido está en camino hacia ${ciudad}. ¡Gracias por tu compra en TEMU!`);
  }
  </script>

</body>
</html>
